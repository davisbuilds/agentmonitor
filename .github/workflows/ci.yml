name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Lint, Build, Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  parity-ts:
    name: Parity Tests (TS)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: checks

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Start server for parity tests
        env:
          AGENTMONITOR_DB_PATH: /tmp/agentmonitor-ci.db
        run: |
          node dist/server.js > /tmp/agentmonitor-ci.log 2>&1 &
          echo $! > /tmp/agentmonitor-ci.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3141/api/health > /dev/null; then
              break
            fi
            sleep 1
          done
          if ! curl -sf http://127.0.0.1:3141/api/health > /dev/null; then
            echo "AgentMonitor failed to start in CI"
            cat /tmp/agentmonitor-ci.log
            exit 1
          fi

      - name: Run parity tests against TypeScript server
        env:
          AGENTMONITOR_BASE_URL: http://127.0.0.1:3141
          AGENTMONITOR_DB_PATH: /tmp/agentmonitor-ci.db
        run: pnpm test:parity:ts

      - name: Show server log on failure
        if: failure()
        run: cat /tmp/agentmonitor-ci.log

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/agentmonitor-ci.pid ]; then
            kill "$(cat /tmp/agentmonitor-ci.pid)" || true
          fi
