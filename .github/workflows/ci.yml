name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Lint, Build, Test
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.29.3

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      # eslint/tsc don't see inside .svelte components; svelte-check does.
      - name: Svelte check
        run: pnpm frontend:check

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.29.3

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Specs boot the Express app in-process against a temp SQLite DB, but
      # serve the built frontend — the build must precede the test run.
      - name: Build
        run: pnpm build

      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium

      # Chromium only in the PR gate; the full browser matrix stays local.
      - name: Run Playwright tests
        run: pnpm exec playwright test --project=chromium

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      # Full-history scan on every run: histories are small (<1s to scan), and
      # .gitleaks.toml (when present) allowlists verified non-secrets, so any
      # finding is a new leak. --redact keeps matched values out of CI logs.
      - name: Scan full git history for secrets
        run: >-
          docker run --rm -v "$PWD":/repo:ro zricethezav/gitleaks:v8.30.1
          git --redact --no-banner /repo
